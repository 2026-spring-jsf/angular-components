<mat-card
    appearance="outlined"
>
    <mat-card-header>
        <mat-card-title>Roll the dice</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <button
            matButton="outlined"
            (click)="rollDice()"
        >
            Roll
        </button>
        <div id="diceContainer">
        @for (roll of results(); track roll) {
            <div class="die">
                {{ roll }}
            </div>
        }
    </div>
    </mat-card-content>
</mat-card>
