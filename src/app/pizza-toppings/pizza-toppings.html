<h2>Choose your pizza toppings</h2>


@for (t of availablePizzaToppings(); track t.name) {
  <div>
    <label>
        ({{t.name}}) ({{t.price | currency}})
        <input 
            type="checkbox"
            [checked]="t.checked"
            (change)="toggleTopping(t)"
        />
    </label>
  </div>
}


<p>Total: {{ total() | currency }}</p>
