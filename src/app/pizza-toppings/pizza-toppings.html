<h1>
    Choose pizza toppings
</h1>

@for (topping of availablePizzaToppings(); track topping) {
    <div>
        <label>
            <input 
                type="checkbox"
            >
            {{ topping.name }} ({{ topping.price | currency }})
        </label>
    </div>
}

<h2>
    Total: {{ total() | currency }}
</h2>
