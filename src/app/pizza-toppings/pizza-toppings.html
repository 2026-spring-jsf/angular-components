<h2>Choose your pizza toppings:</h2>

@for (topping of pizzaToppings(); track topping) {
    <div>
        <label >
            <input type="checkbox" [checked]="topping.checked" (change)="toggleTopping(topping)">
            {{topping.name}} ({{topping.price | currency}})
        </label>
    </div>
}
